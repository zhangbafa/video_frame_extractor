name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            ext: ''
          - os: windows-latest
            platform: windows
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --name video-extract${{ matrix.ext }} video_frame_extractor/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-extract-${{ matrix.platform }}
          path: dist/video-extract${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(python << 'EOF'
          import re
          with open('video_frame_extractor/__init__.py') as f:
              match = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", f.read())
              print(match.group(1) if match else '0.0.0')
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: video-extract-macos
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: video-extract-windows
          path: dist/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Video Frame Extractor v${{ steps.version.outputs.version }}
            
            ### 下载
            
            | 平台 | 文件 |
            | --- | --- |
            | macOS | video-extract (下方下载) |
            | Windows | video-extract.exe (下方下载) |
            
            ### macOS 使用方法
            ```bash
            chmod +x video-extract
            ./video-extract -i video.mp4 -o frames -m time -t 5
            ```
            
            ### Windows 使用方法
            ```cmd
            video-extract.exe -i video.mp4 -o frames -m time -t 5
            ```
          files: |
            dist/macos/video-extract
            dist/windows/video-extract.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
